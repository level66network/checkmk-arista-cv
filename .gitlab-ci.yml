stages:
  - lint
  - build
  - release

lint:
  stage: lint
  image: python:3.11-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq make
  script:
    - make vendor
    - make lint
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

build:
  stage: build
  image: python:3.11-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq make
  script:
    - VERSION=${CI_COMMIT_TAG#v}
    - |
      sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" build_mkp.py
    - make vendor
    - make build
  artifacts:
    paths:
      - '*.mkp'
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build
      artifacts: true
  before_script:
    - apk add --no-cache curl
  script:
    - VERSION=${CI_COMMIT_TAG#v}
    - |
      curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" \
           --upload-file arista_cv-${VERSION}.mkp \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/arista_cv/${VERSION}/arista_cv-${VERSION}.mkp"
    - ASSET_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/arista_cv/${VERSION}/arista_cv-${VERSION}.mkp"
    - |
      release-cli create \
        --name "$CI_COMMIT_TAG" \
        --tag-name "$CI_COMMIT_TAG" \
        --description "Release $CI_COMMIT_TAG" \
        --assets-link "{\"name\":\"arista_cv-${VERSION}.mkp\",\"url\":\"${ASSET_URL}\"}"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
